<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#c8a25a" stroke-width="2.5"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="86" fill="none" stroke="#c8a25a" stroke-width="1.2"/>

  <!-- Diamond stars — 8 points between the two rings -->
  <!-- Top -->
  <polygon points="100,2 103,9 100,16 97,9" fill="#c8a25a"/>
  <!-- Top-right -->
  <polygon points="166,30 169,37 166,44 163,37" fill="#c8a25a"/>
  <!-- Right -->
  <polygon points="196,100 189,103 182,100 189,97" fill="#c8a25a"/>
  <!-- Bottom-right -->
  <polygon points="166,156 169,163 166,170 163,163" fill="#c8a25a"/>
  <!-- Bottom -->
  <polygon points="100,184 103,191 100,198 97,191" fill="#c8a25a"/>
  <!-- Bottom-left -->
  <polygon points="34,156 37,163 34,170 31,163" fill="#c8a25a"/>
  <!-- Left -->
  <polygon points="18,100 11,103 4,100 11,97" fill="#c8a25a"/>
  <!-- Top-left -->
  <polygon points="34,30 37,37 34,44 31,37" fill="#c8a25a"/>

  <!-- Shield — outline only, no fill so background shows through -->
  <path d="
    M100 35
    C88 37 68 42 56 48
    L56 92
    C56 118 74 138 100 152
    C126 138 144 118 144 92
    L144 48
    C132 42 112 37 100 35Z
  " fill="none" stroke="#c8a25a" stroke-width="4.5" stroke-linejoin="round"/>

  <!-- Inner shield border (thinner, subtler) -->
  <path d="
    M100 44
    C90 46 74 50 65 54
    L65 91
    C65 113 80 130 100 142
    C120 130 135 113 135 91
    L135 54
    C126 50 110 46 100 44Z
  " fill="none" stroke="#c8a25a" stroke-width="1.2" stroke-linejoin="round" opacity="0.35"/>

  <!-- Checkmark — bold stroke -->
  <polyline points="76,96 92,113 125,74" fill="none" stroke="#c8a25a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left laurel branch -->
  <g opacity="0.85">
    <!-- Stem -->
    <path d="M97,162 C88,158 76,156 64,160" fill="none" stroke="#c8a25a" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Upper leaves -->
    <ellipse cx="72" cy="156" rx="6" ry="2.8" transform="rotate(-25,72,156)" fill="#c8a25a"/>
    <ellipse cx="81" cy="154" rx="5.5" ry="2.6" transform="rotate(-15,81,154)" fill="#c8a25a"/>
    <ellipse cx="90" cy="155" rx="5" ry="2.4" transform="rotate(-5,90,155)" fill="#c8a25a"/>
    <!-- Lower leaves -->
    <ellipse cx="74" cy="162" rx="6" ry="2.8" transform="rotate(20,74,162)" fill="#c8a25a"/>
    <ellipse cx="83" cy="160" rx="5.5" ry="2.6" transform="rotate(12,83,160)" fill="#c8a25a"/>
    <ellipse cx="91" cy="160" rx="5" ry="2.4" transform="rotate(5,91,160)" fill="#c8a25a"/>
  </g>

  <!-- Right laurel branch (mirrored) -->
  <g opacity="0.85">
    <!-- Stem -->
    <path d="M103,162 C112,158 124,156 136,160" fill="none" stroke="#c8a25a" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Upper leaves -->
    <ellipse cx="128" cy="156" rx="6" ry="2.8" transform="rotate(25,128,156)" fill="#c8a25a"/>
    <ellipse cx="119" cy="154" rx="5.5" ry="2.6" transform="rotate(15,119,154)" fill="#c8a25a"/>
    <ellipse cx="110" cy="155" rx="5" ry="2.4" transform="rotate(5,110,155)" fill="#c8a25a"/>
    <!-- Lower leaves -->
    <ellipse cx="126" cy="162" rx="6" ry="2.8" transform="rotate(-20,126,162)" fill="#c8a25a"/>
    <ellipse cx="117" cy="160" rx="5.5" ry="2.6" transform="rotate(-12,117,160)" fill="#c8a25a"/>
    <ellipse cx="109" cy="160" rx="5" ry="2.4" transform="rotate(-5,109,160)" fill="#c8a25a"/>
  </g>
</svg>
