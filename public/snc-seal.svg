<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <style>
      .s{fill:#c8a25a}
    </style>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="95" stroke="#c8a25a" stroke-width="3" fill="none"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="85" stroke="#c8a25a" stroke-width="1.5" fill="none"/>

  <!-- Stars at cardinal points (4-point diamond stars) -->
  <!-- Top -->
  <path class="s" d="M100 8 L103 14 L100 20 L97 14Z"/>
  <!-- Bottom -->
  <path class="s" d="M100 180 L103 186 L100 192 L97 186Z"/>
  <!-- Left -->
  <path class="s" d="M8 100 L14 97 L20 100 L14 103Z"/>
  <!-- Right -->
  <path class="s" d="M180 100 L186 97 L192 100 L186 103Z"/>

  <!-- Diagonal stars -->
  <!-- Top-left -->
  <path class="s" d="M33 33 L36.5 37 L33 41 L29.5 37Z"/>
  <!-- Top-right -->
  <path class="s" d="M167 33 L170.5 37 L167 41 L163.5 37Z"/>
  <!-- Bottom-left -->
  <path class="s" d="M33 159 L36.5 163 L33 167 L29.5 163Z"/>
  <!-- Bottom-right -->
  <path class="s" d="M167 159 L170.5 163 L167 167 L163.5 163Z"/>

  <!-- Shield body -->
  <path class="s" d="
    M100 38
    C100 38 65 42 55 48
    L55 95
    C55 120 75 140 100 152
    C125 140 145 120 145 95
    L145 48
    C135 42 100 38 100 38Z
  " fill="none" stroke="#c8a25a" stroke-width="4" stroke-linejoin="round"/>

  <!-- Inner shield line -->
  <path d="
    M100 46
    C100 46 72 49 64 54
    L64 93
    C64 114 80 131 100 141
    C120 131 136 114 136 93
    L136 54
    C128 49 100 46 100 46Z
  " fill="none" stroke="#c8a25a" stroke-width="1.5" stroke-linejoin="round" opacity="0.4"/>

  <!-- Checkmark -->
  <path d="M76 95 L93 112 L124 76" stroke="#c8a25a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Left laurel branch -->
  <g transform="translate(56, 148)" opacity="0.9">
    <!-- Stem -->
    <path d="M44 12 C35 8, 20 6, 6 14" stroke="#c8a25a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Leaves left side -->
    <ellipse cx="14" cy="10" rx="5" ry="2.5" transform="rotate(-30, 14, 10)" class="s"/>
    <ellipse cx="22" cy="7" rx="5" ry="2.5" transform="rotate(-20, 22, 7)" class="s"/>
    <ellipse cx="31" cy="6" rx="5" ry="2.5" transform="rotate(-10, 31, 6)" class="s"/>
    <ellipse cx="39" cy="8" rx="4.5" ry="2.5" transform="rotate(5, 39, 8)" class="s"/>
    <!-- Leaves right side -->
    <ellipse cx="16" cy="15" rx="5" ry="2.5" transform="rotate(20, 16, 15)" class="s"/>
    <ellipse cx="24" cy="13" rx="5" ry="2.5" transform="rotate(10, 24, 13)" class="s"/>
    <ellipse cx="33" cy="12" rx="5" ry="2.5" transform="rotate(0, 33, 12)" class="s"/>
  </g>

  <!-- Right laurel branch (mirrored) -->
  <g transform="translate(144, 148) scale(-1,1)" opacity="0.9">
    <!-- Stem -->
    <path d="M44 12 C35 8, 20 6, 6 14" stroke="#c8a25a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Leaves left side -->
    <ellipse cx="14" cy="10" rx="5" ry="2.5" transform="rotate(-30, 14, 10)" class="s"/>
    <ellipse cx="22" cy="7" rx="5" ry="2.5" transform="rotate(-20, 22, 7)" class="s"/>
    <ellipse cx="31" cy="6" rx="5" ry="2.5" transform="rotate(-10, 31, 6)" class="s"/>
    <ellipse cx="39" cy="8" rx="4.5" ry="2.5" transform="rotate(5, 39, 8)" class="s"/>
    <!-- Leaves right side -->
    <ellipse cx="16" cy="15" rx="5" ry="2.5" transform="rotate(20, 16, 15)" class="s"/>
    <ellipse cx="24" cy="13" rx="5" ry="2.5" transform="rotate(10, 24, 13)" class="s"/>
    <ellipse cx="33" cy="12" rx="5" ry="2.5" transform="rotate(0, 33, 12)" class="s"/>
  </g>
</svg>
